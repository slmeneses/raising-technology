<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>raising technology</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<video id="video" playsinline autoplay muted></video>
<canvas id="c"></canvas>
<div id="status"></div>
<div id="milestone"></div>
<div id="attention"></div>
<div id="rating">
  <div class="prompt">PLEASE RATE YOUR<br>EXPERIENCE TODAY</div>
  <div class="faces">
    <svg class="face" width="80" height="80" viewBox="0 0 80 80" data-val="4">
      <circle class="outline" cx="40" cy="40" r="36" fill="none" stroke="#fff" stroke-width="2"/>
      <circle class="dot" cx="28" cy="32" r="3" fill="#fff"/>
      <circle class="dot" cx="52" cy="32" r="3" fill="#fff"/>
      <path class="mouth" d="M24 50 Q40 64 56 50" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <svg class="face" width="80" height="80" viewBox="0 0 80 80" data-val="3">
      <circle class="outline" cx="40" cy="40" r="36" fill="none" stroke="#fff" stroke-width="2"/>
      <circle class="dot" cx="28" cy="32" r="3" fill="#fff"/>
      <circle class="dot" cx="52" cy="32" r="3" fill="#fff"/>
      <path class="mouth" d="M26 52 Q40 58 54 52" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <svg class="face" width="80" height="80" viewBox="0 0 80 80" data-val="2">
      <circle class="outline" cx="40" cy="40" r="36" fill="none" stroke="#fff" stroke-width="2"/>
      <circle class="dot" cx="28" cy="32" r="3" fill="#fff"/>
      <circle class="dot" cx="52" cy="32" r="3" fill="#fff"/>
      <line class="mouth" x1="26" y1="54" x2="54" y2="54" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <svg class="face" width="80" height="80" viewBox="0 0 80 80" data-val="1">
      <circle class="outline" cx="40" cy="40" r="36" fill="none" stroke="#fff" stroke-width="2"/>
      <circle class="dot" cx="28" cy="32" r="3" fill="#fff"/>
      <circle class="dot" cx="52" cy="32" r="3" fill="#fff"/>
      <path class="mouth" d="M24 58 Q40 46 56 58" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </div>
</div>

<div class="hud-bar" id="hud-tl">
  <div class="bar-label">Recognition</div>
  <div class="bar-track"><div class="bar-fill" id="fill-recognition"></div></div>
</div>
<div class="hud-bar" id="hud-tr">
  <div class="bar-label">Attachment</div>
  <div class="bar-track"><div class="bar-fill" id="fill-attachment"></div></div>
</div>
<div class="hud-bar" id="hud-bl">
  <div class="bar-label">Dependency</div>
  <div class="bar-track"><div class="bar-fill" id="fill-dependency"></div></div>
</div>
<div class="hud-bar" id="hud-br">
  <div class="bar-label">Communication</div>
  <div class="bar-track"><div class="bar-fill" id="fill-communication"></div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<script src="script.js"></script>
</body>
</html>
